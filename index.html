<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Georgia', serif; color: #2c2a26; background: #f5f2ee; min-height: 100vh; padding: 32px 16px; }
.wrap { max-width: 780px; margin: 0 auto; background: #fff; border: 1px solid #e8ddd0; border-radius: 12px; padding: 32px 36px; }
h1 { font-size: 1.1em; font-weight: 500; letter-spacing: .12em; color: #9a7a5a; margin-bottom: 28px; text-align: center; border-bottom: 1px solid #ede4d8; padding-bottom: 16px; }
textarea:focus, input:focus { outline: none; }
input::placeholder, textarea::placeholder { color: #c0b0a0; }
.layout-btn:hover { background: #f0e8dc !important; }
.tab-btn { transition: color .15s, border-color .15s; }
input[type="color"] { padding: 0; border: 1px solid #e0d4c4; border-radius: 4px; cursor: pointer; height: 26px; width: 36px; background: none; }
.preset-btn { transition: transform .15s; cursor: pointer; }
.preset-btn:hover { transform: translateY(-1px); }
.delete-btn:hover { color: #c07070 !important; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Log Editor</h1>
  <div id="app"></div>
</div>

<script>
const PRESETS = [
  { name:"양피지", colors:{ bg:"#faf7f3", text:"#2c2a26", charColor:"#9a7a5a", userColor:"#7a8a9a", dialogBg:"rgba(160,120,60,0.18)", italicColor:"#b07a5a", bubbleBgChar:"#ffffff", bubbleBgUser:"#f5f0e8", bubbleBorder:"#ede4d8" }},
  { name:"로즈",   colors:{ bg:"#fdf5f5", text:"#2e2428", charColor:"#c4728a", userColor:"#a09098", dialogBg:"rgba(196,114,138,0.15)", italicColor:"#c49898", bubbleBgChar:"#ffffff", bubbleBgUser:"#f8eff1", bubbleBorder:"#f0dde2" }},
  { name:"먹빛",   colors:{ bg:"#1e1c1a", text:"#d4cfc8", charColor:"#c8a87a", userColor:"#8a9aaa", dialogBg:"rgba(200,168,122,0.2)", italicColor:"#a8987a", bubbleBgChar:"#2a2824", bubbleBgUser:"#242830", bubbleBorder:"#3a3830" }},
  { name:"세이지", colors:{ bg:"#f4f6f2", text:"#2a2e28", charColor:"#6a8a6a", userColor:"#8a8a7a", dialogBg:"rgba(106,138,106,0.15)", italicColor:"#8aaa7a", bubbleBgChar:"#ffffff", bubbleBgUser:"#eef2ec", bubbleBorder:"#dde6da" }},
  { name:"슬레이트",colors:{ bg:"#f3f5f7", text:"#262a2e", charColor:"#5a7a9a", userColor:"#8a8a9a", dialogBg:"rgba(90,122,154,0.15)", italicColor:"#7a9aba", bubbleBgChar:"#ffffff", bubbleBgUser:"#edf0f4", bubbleBorder:"#dce2e8" }},
  { name:"에스프레소",colors:{ bg:"#f5f0eb", text:"#28201a", charColor:"#7a5a3a", userColor:"#9a8a7a", dialogBg:"rgba(122,90,58,0.18)", italicColor:"#a07858", bubbleBgChar:"#ffffff", bubbleBgUser:"#ede6dc", bubbleBorder:"#ddd4c8" }},
];

const state = {
  messages:[], layout:"novel",
  title:"", subtitle:"",
  charName:"캐릭터", userName:"유저",
  copied:false, tab:"basic",
  colors:{ ...PRESETS[0].colors },
  confirmDeleteId: null,
};

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function fmtHtml(text, colors){
  const {dialogBg,italicColor}=colors;
  const pat=/"([^"]+)"|(?<![a-zA-Z])'([^'\n]+)'(?![a-zA-Z])|\*([^*\n]+)\*/g;
  let last=0,out="",m;
  while((m=pat.exec(text))!==null){
    out+=esc(text.slice(last,m.index));
    if(m[1]!=null) out+=`<strong style="background:${dialogBg};padding:0 3px;border-radius:2px;font-weight:700">"${esc(m[1])}"</strong>`;
    else if(m[2]!=null) out+=`<em style="font-style:italic;color:${italicColor}">'${esc(m[2])}'</em>`;
    else if(m[3]!=null) out+=`<em style="font-style:italic;color:${italicColor}">${esc(m[3])}</em>`;
    last=m.index+m[0].length;
  }
  return out+esc(text.slice(last));
}

function toParas(text,colors){
  return text.split(/\n\n+/).map((p,i,arr)=>
    `<div style="margin-bottom:${i===arr.length-1?"0":"1em"};line-height:1.95">${
      p.split(/\n/).map(l=>fmtHtml(l,colors)).join("<br>")
    }</div>`
  ).join("");
}

function parseRisu(raw){
  try{
    const o=JSON.parse(raw);
    if(o.type==="risuChat"&&o.data?.message){
      return{ title:o.data.name||"Untitled",
        messages:o.data.message.map((m,i)=>({id:i,role:m.role,text:m.data||"",note:"",noteOpen:false,editing:false,collapsed:false})) };
    }
  }catch(_){}
  return null;
}

function noteBlockStr(note){
  if(!note.trim()) return "";
  return `<details style="margin-top:10px;font-size:.82em;border-top:1px solid #ede4d8;padding-top:8px"><summary style="cursor:pointer;list-style:none;color:#c8b8a8;letter-spacing:.04em">▸ 원문</summary><div style="margin-top:6px;line-height:1.85;color:#aaa">${esc(note)}</div></details>`;
}

function generateHTML(){
  const {messages,layout,charName,userName,title,subtitle,colors}=state;
  const visible=messages.filter(m=>!m.collapsed);
  const cover=`<div style="text-align:center;padding:1.5em 0 1.8em;border-bottom:1px solid #e8ddd0;margin-bottom:2.5em">
  <div style="font-size:1.2em;font-weight:500;letter-spacing:.1em;color:${colors.charColor};margin-bottom:.3em">${esc(title)}</div>
  ${subtitle?`<div style="font-size:.78em;color:${colors.userColor};letter-spacing:.06em">${esc(subtitle)}</div>`:""}
</div>`;
  const fn = msg => {
    const isC=msg.role==="char";
    if(layout==="novel") return `<div style="margin-bottom:2.2em"><div style="font-size:.68em;letter-spacing:.12em;text-transform:uppercase;color:${isC?colors.charColor:colors.userColor};margin-bottom:.6em">${esc(isC?charName:userName)}</div><div style="color:${colors.text}">${toParas(msg.text,colors)}</div>${noteBlockStr(msg.note)}</div>`;
    if(layout==="bubble") return `<div style="margin-bottom:1.8em"><div style="font-size:.72em;font-weight:500;color:${isC?colors.charColor:colors.userColor};margin-bottom:.5em">${esc(isC?charName:userName)}</div><div style="background:${isC?colors.bubbleBgChar:colors.bubbleBgUser};border:1px solid ${colors.bubbleBorder};border-radius:12px;padding:16px 20px;font-size:.95em;color:${colors.text}">${toParas(msg.text,colors)}${noteBlockStr(msg.note)}</div></div>`;
    return `<div style="display:flex;gap:18px;margin-bottom:2em;align-items:flex-start"><div style="width:64px;flex-shrink:0;text-align:right;font-size:.68em;color:${isC?colors.charColor:colors.userColor};padding-top:3px">${esc(isC?charName:userName)}</div><div style="flex:1;border-left:2px solid ${isC?colors.charColor:colors.userColor};padding-left:16px;color:${colors.text}">${toParas(msg.text,colors)}${noteBlockStr(msg.note)}</div></div>`;
  };
  return `<div style="max-width:680px;margin:0 auto;font-family:'Noto Serif KR',Georgia,serif;color:${colors.text};padding:2.5em 1.2em;background:${colors.bg}">\n${cover}${visible.map(fn).join("\n")}\n</div>`;
}

function buildMsg(msg){
  const {layout,charName,userName,colors,confirmDeleteId}=state;
  const isC=msg.role==="char";
  const name=isC?charName:userName;
  const nameColor=isC?colors.charColor:colors.userColor;
  const preview=msg.text.replace(/\n/g," ").slice(0,45)+(msg.text.length>45?"…":"");
  const isConfirming=confirmDeleteId===msg.id;

  const actions=isConfirming
    ?`<div style="display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0">
        <span style="font-size:.65em;color:#b09080">삭제할까요?</span>
        <button class="delete-yes" data-id="${msg.id}" style="font-size:.65em;color:#c07070;background:none;border:1px solid #e0c8c8;border-radius:3px;cursor:pointer;padding:1px 7px">예</button>
        <button class="delete-no" data-id="${msg.id}" style="font-size:.65em;color:#a0a0a0;background:none;border:1px solid #e0dcd8;border-radius:3px;cursor:pointer;padding:1px 7px">아니오</button>
      </div>`
    :`<div style="display:flex;align-items:center;gap:0;margin-left:auto;flex-shrink:0">
        <button class="collapse-btn" data-id="${msg.id}" style="font-size:.68em;color:#c8b8a4;background:none;border:none;cursor:pointer;padding:2px 6px" title="${msg.collapsed?"펼치기":"접기"}">${msg.collapsed?"▶":"▼"}</button>
        <button class="delete-btn" data-id="${msg.id}" style="font-size:.68em;color:#d4b8b8;background:none;border:none;cursor:pointer;padding:2px 6px">✕</button>
      </div>`;

  const header=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:${msg.collapsed?0:".6em"};cursor:pointer;user-select:none" class="msg-header" data-id="${msg.id}">
    <span style="font-size:.68em;letter-spacing:.1em;text-transform:uppercase;color:${nameColor};flex-shrink:0">${esc(name)}</span>
    ${msg.collapsed?`<span style="font-size:.72em;color:#c0b0a0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">${esc(preview)}</span>`:`<span style="flex:1"></span>`}
    ${actions}
  </div>`;

  if(msg.collapsed) return`<div style="margin-bottom:.6em;padding:4px 0;border-bottom:1px dashed #ede4d8" data-msg-id="${msg.id}">${header}</div>`;

  const textContent=msg.editing
    ?`<textarea class="msg-text" data-id="${msg.id}" style="width:100%;min-height:100px;font-family:inherit;font-size:inherit;line-height:1.9;padding:8px 10px;border:1px solid #d4c8b4;border-radius:4px;background:#fdf4ea;resize:vertical">${esc(msg.text)}</textarea>`
    :`<div style="color:${colors.text}">${toParas(msg.text,colors)}</div>`;

  const editControls=`<div style="display:flex;gap:4px;margin-top:8px">
    <button class="edit-btn" data-id="${msg.id}" style="font-size:.65em;letter-spacing:.06em;color:#c8b8a4;background:none;border:none;cursor:pointer;padding:2px 4px">${msg.editing?"완료":"편집"}</button>
    <span style="font-size:.65em;color:#e0d4c4;line-height:1.8">·</span>
    <button class="note-btn" data-id="${msg.id}" style="font-size:.65em;letter-spacing:.06em;color:#c8b8a4;background:none;border:none;cursor:pointer;padding:2px 4px">${msg.noteOpen?"원문 닫기":"+ 원문"}</button>
  </div>`;

  const noteArea=msg.noteOpen?`<div style="margin-top:8px;border-top:1px solid #ede4d8;padding-top:8px">
    <div style="font-size:.65em;color:#c8b8a4;margin-bottom:4px">원문 (번역 전)</div>
    <textarea class="note-text" data-id="${msg.id}" placeholder="원문을 입력하세요..." style="width:100%;min-height:50px;font-family:inherit;font-size:.85em;color:#aaa;padding:6px 8px;border:1px solid #ede4d8;border-radius:4px;background:#f8f4ef;resize:vertical"></textarea>
  </div>`:"";

  setTimeout(()=>{ const ta=document.querySelector(`.note-text[data-id="${msg.id}"]`);if(ta)ta.value=msg.note; },0);

  let body="";
  if(layout==="bubble") body=`<div style="background:${isC?colors.bubbleBgChar:colors.bubbleBgUser};border:1px solid ${colors.bubbleBorder};border-radius:12px;padding:16px 20px;font-size:.95em">${textContent}${editControls}${noteArea}</div>`;
  else if(layout==="minimal") body=`<div style="display:flex;gap:18px;align-items:flex-start"><div style="flex:1;border-left:2px solid ${nameColor};padding-left:16px">${textContent}${editControls}${noteArea}</div></div>`;
  else body=textContent+editControls+noteArea;

  return`<div style="margin-bottom:${layout==="bubble"?"1.8em":"2.2em"}" data-msg-id="${msg.id}">${header}${body}</div>`;
}

function hexFromColor(c){ if(c.startsWith("rgba")){const m=c.match(/[\d.]+/g);return"#"+[+m[0],+m[1],+m[2]].map(x=>x.toString(16).padStart(2,"0")).join("");}return c; }
function alphaFromRgba(c){ const m=c.match(/[\d.]+/g);return m&&m[3]!=null?Math.round(parseFloat(m[3])*100):100; }
function hexToRgba(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a/100})`; }

function buildColorPanel(){
  const presetBtns=PRESETS.map((p,i)=>{
    const active=JSON.stringify(state.colors)===JSON.stringify(p.colors);
    return`<button class="preset-btn" data-preset="${i}" style="font-family:Georgia,serif;font-size:.76em;padding:5px 14px;border-radius:20px;border:1px solid ${active?p.colors.charColor:"#e0d4c4"};background:${p.colors.bg};color:${p.colors.charColor};font-weight:${active?500:400}">${p.name}</button>`;
  }).join("");
  const rows=[["bg","배경"],["text","본문 텍스트"],["charColor","캐릭터명"],["userColor","유저명"],["dialogBg","대사 하이라이트"],["italicColor","이탤릭 강조색"],["bubbleBgChar","말풍선 (캐릭터)"],["bubbleBgUser","말풍선 (유저)"]].map(([key,label])=>{
    const val=state.colors[key],isRgba=val.startsWith("rgba");
    return`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0e8e0">
      <span style="font-size:.78em;color:#8a7a6a">${label}</span>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="color" class="color-inp" data-key="${key}" data-rgba="${isRgba?1:0}" value="${hexFromColor(val)}">
        ${isRgba?`<input type="range" class="alpha-inp" data-key="${key}" min="0" max="100" value="${alphaFromRgba(val)}" style="width:56px;height:4px;accent-color:#b0906a">`:""}
      </div>
    </div>`;
  }).join("");
  return`<div style="background:#faf7f3;border:1px solid #ede4d8;border-radius:8px;padding:14px 16px;margin-bottom:20px">
    <div style="font-size:.72em;letter-spacing:.08em;color:#b0a090;margin-bottom:10px">테마 프리셋</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${presetBtns}</div>
    <div style="font-size:.72em;letter-spacing:.08em;color:#b0a090;margin-bottom:8px">세부 조정</div>
    ${rows}
    <button id="reset-colors" style="font-family:Georgia,serif;font-size:.72em;color:#c0a888;background:none;border:none;cursor:pointer;padding:0;margin-top:10px">↺ 기본값으로</button>
  </div>`;
}

function render(){
  const focused = document.activeElement?.id;
  const selStart = document.activeElement?.selectionStart;
  const selEnd = document.activeElement?.selectionEnd;
  document.getElementById("app").innerHTML=buildApp();
  bindEvents();
  if(focused){
    const el = document.getElementById(focused);
    if(el){ el.focus(); try{ el.setSelectionRange(selStart,selEnd); }catch(_){} }
  }
}

function buildApp(){
  const {layout,title,subtitle,charName,userName,messages,copied,tab,colors}=state;
  const IS="font-family:Georgia,serif;font-size:.88em;color:#5a4a3a;background:transparent;border:none;border-bottom:1px solid #e0d4c4;padding:4px 2px;";
  const visibleCount=messages.filter(m=>!m.collapsed).length;
  const preview=messages.length===0
    ?`<div style="text-align:center;padding:4em 0;color:#c8b8a8;font-size:.85em;letter-spacing:.06em"><div style="font-size:1.8em;margin-bottom:.5em;opacity:.3">◌</div>JSON 파일을 업로드하면 로그가 표시됩니다</div>`
    :`<div style="background:${colors.bg};border:1px solid #ede4d8;border-radius:10px;padding:2em 1.8em">
        <div style="text-align:center;padding:0 0 1.5em;border-bottom:1px solid #ede4d8;margin-bottom:2em">
          <div style="font-size:1.15em;font-weight:500;letter-spacing:.08em;color:${colors.charColor}">${esc(title||"제목 없음")}</div>
          ${subtitle?`<div style="font-size:.78em;color:${colors.userColor};margin-top:.35em">${esc(subtitle)}</div>`:""}
        </div>
        <div style="font-size:.72em;color:#c0b0a0;margin-bottom:16px">${messages.length}개 전체 · ${visibleCount}개 표시</div>
        ${messages.map(buildMsg).join("")}
      </div>`;
  return`
    <div style="border-bottom:1px solid #e8ddd0;padding-bottom:16px;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px">
        <input id="inp-title" value="${esc(title)}" placeholder="로그 제목" style="${IS}flex:1;min-width:160px;font-size:1em;letter-spacing:.04em">
        <input id="inp-sub" value="${esc(subtitle)}" placeholder="부제 (선택)" style="${IS}width:150px;font-size:.85em">
        <label style="font-family:Georgia,serif;font-size:.78em;letter-spacing:.06em;padding:5px 14px;border:1px solid #d4c0a8;border-radius:3px;cursor:pointer;color:#8a6a4a;user-select:none" for="file-inp">JSON 업로드</label>
        <input id="file-inp" type="file" accept=".json" style="display:none">
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <input id="inp-char" value="${esc(charName)}" placeholder="캐릭터 이름" style="${IS}width:110px">
        <span style="color:#d4c4b0">·</span>
        <input id="inp-user" value="${esc(userName)}" placeholder="유저 이름" style="${IS}width:110px">
        <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
          <div style="display:flex;border:1px solid #e0d4c4;border-radius:4px;overflow:hidden">
            ${[["novel","소설체"],["bubble","말풍선"],["minimal","미니멀"]].map(([k,l])=>
              `<button class="layout-btn" data-layout="${k}" style="font-family:Georgia,serif;font-size:.76em;letter-spacing:.05em;padding:5px 13px;border:none;cursor:pointer;background:${layout===k?"#e8ddd0":"transparent"};color:${layout===k?"#6a4a2a":"#aaa"};font-weight:${layout===k?500:400}">${l}</button>`
            ).join("")}
          </div>
          <button id="copy-btn" ${!messages.length?"disabled":""} style="font-family:Georgia,serif;font-size:.76em;letter-spacing:.05em;padding:5px 16px;border:1px solid #d4c0a8;border-radius:4px;background:${copied?"#e8ddd0":"transparent"};color:${copied?"#6a4a2a":"#a08060"};cursor:${!messages.length?"not-allowed":"pointer"};opacity:${!messages.length?.4:1}">${copied?"복사됨 ✓":"HTML 복사"}</button>
        </div>
      </div>
    </div>
    <div style="display:flex;border-bottom:1px solid #e8ddd0;margin-bottom:20px">
      ${[["basic","기본 설정"],["color","색상 설정"]].map(([k,l])=>
        `<button class="tab-btn" data-tab="${k}" style="font-family:Georgia,serif;font-size:.78em;padding:6px 16px;border:none;background:none;cursor:pointer;color:${tab===k?"#6a4a2a":"#bbb"};border-bottom:2px solid ${tab===k?"#c0a878":"transparent"};margin-bottom:-1px">${l}</button>`
      ).join("")}
    </div>
    ${tab==="color"?buildColorPanel():""}
    ${preview}`;
}

function bindEvents(){
  document.getElementById("inp-title")?.addEventListener("input",e=>{state.title=e.target.value;});
  document.getElementById("inp-sub")?.addEventListener("input",e=>{state.subtitle=e.target.value;});
  document.getElementById("inp-char")?.addEventListener("input",e=>{state.charName=e.target.value;render();});
  document.getElementById("inp-user")?.addEventListener("input",e=>{state.userName=e.target.value;render();});
  document.getElementById("file-inp")?.addEventListener("change",e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const parsed=parseRisu(ev.target.result);
      if(parsed){state.title=parsed.title;state.messages=parsed.messages;state.confirmDeleteId=null;render();}
      else alert("리수 JSON 파일을 인식할 수 없어요.");
      e.target.value="";
    };
    reader.readAsText(file);
  });
  document.querySelectorAll(".layout-btn").forEach(btn=>btn.addEventListener("click",()=>{state.layout=btn.dataset.layout;render();}));
  document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",()=>{state.tab=btn.dataset.tab;render();}));
  document.querySelectorAll(".preset-btn").forEach(btn=>btn.addEventListener("click",()=>{state.colors={...PRESETS[+btn.dataset.preset].colors};render();}));
  document.getElementById("copy-btn")?.addEventListener("click",async()=>{
    if(!state.messages.length)return;
    await navigator.clipboard.writeText(generateHTML());
    state.copied=true;render();
    setTimeout(()=>{state.copied=false;render();},2200);
  });
  document.getElementById("reset-colors")?.addEventListener("click",()=>{state.colors={...PRESETS[0].colors};render();});
  document.querySelectorAll(".color-inp").forEach(inp=>{
    inp.addEventListener("input",e=>{
      const key=inp.dataset.key,isRgba=inp.dataset.rgba==="1";
      if(isRgba){const a=document.querySelector(`.alpha-inp[data-key="${key}"]`);state.colors[key]=hexToRgba(e.target.value,a?+a.value:18);}
      else state.colors[key]=e.target.value;
      render();
    });
  });
  document.querySelectorAll(".alpha-inp").forEach(inp=>{
    inp.addEventListener("input",e=>{
      const key=inp.dataset.key,c=document.querySelector(`.color-inp[data-key="${key}"]`);
      state.colors[key]=hexToRgba(c?c.value:"#a07830",+e.target.value);render();
    });
  });
  document.querySelectorAll(".msg-header").forEach(el=>{
    el.addEventListener("click",e=>{
      if(e.target.closest("button"))return;
      const msg=state.messages.find(m=>m.id===+el.dataset.id);
      if(msg){msg.collapsed=!msg.collapsed;state.confirmDeleteId=null;render();}
    });
  });
  document.querySelectorAll(".collapse-btn").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      const msg=state.messages.find(m=>m.id===+btn.dataset.id);
      if(msg){msg.collapsed=!msg.collapsed;state.confirmDeleteId=null;render();}
    });
  });
  document.querySelectorAll(".delete-btn").forEach(btn=>{
    btn.addEventListener("click",e=>{e.stopPropagation();state.confirmDeleteId=+btn.dataset.id;render();});
  });
  document.querySelectorAll(".delete-yes").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      state.messages=state.messages.filter(m=>m.id!==+btn.dataset.id);
      state.confirmDeleteId=null;render();
    });
  });
  document.querySelectorAll(".delete-no").forEach(btn=>{
    btn.addEventListener("click",e=>{e.stopPropagation();state.confirmDeleteId=null;render();});
  });
  document.querySelectorAll(".edit-btn").forEach(btn=>btn.addEventListener("click",()=>{const msg=state.messages.find(m=>m.id===+btn.dataset.id);if(msg){msg.editing=!msg.editing;render();}}));
  document.querySelectorAll(".note-btn").forEach(btn=>btn.addEventListener("click",()=>{const msg=state.messages.find(m=>m.id===+btn.dataset.id);if(msg){msg.noteOpen=!msg.noteOpen;render();}}));
  document.querySelectorAll(".msg-text").forEach(ta=>ta.addEventListener("input",e=>{const msg=state.messages.find(m=>m.id===+ta.dataset.id);if(msg)msg.text=e.target.value;}));
  document.querySelectorAll(".note-text").forEach(ta=>ta.addEventListener("input",e=>{const msg=state.messages.find(m=>m.id===+ta.dataset.id);if(msg)msg.note=e.target.value;}));
}

render();
</script>
</body>
</html>
